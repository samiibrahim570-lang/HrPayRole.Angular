<!-- Top Navbar -->
<nav class="navbar navbar-expand bg-body border-bottom sticky-top px-3 py-2 app-navbar">

  <button
    class="btn btn-outline-secondary d-md-none me-2"
    type="button"
    data-bs-toggle="offcanvas"
    data-bs-target="#sidebarOffcanvas">

    <i class="bi bi-list fs-5"></i>

  </button>

  <form class="d-none d-md-flex flex-grow-1 me-4 app-search" style="max-width:420px;">

    <div class="input-group">

      <span class="input-group-text bg-body-tertiary border-0">
        <i class="bi bi-search"></i>
      </span>

      <input
        type="text"
        class="form-control bg-body-tertiary border-0"
        [placeholder]="'search_placeholder' | translate">

    </div>

  </form>

  <div class="ms-auto d-flex align-items-center gap-3">

    <button class="btn btn-link text-body p-1 icon-btn" type="button">
      <i class="bi bi-bell fs-5"></i>
    </button>

    <button
      class="btn btn-link text-body p-1 icon-btn d-none d-sm-inline-block"
      type="button"
      (click)="toggleTheme()">

      <i
        class="bi"
        [ngClass]="(theme$ | async) === 'dark' ? 'bi-sun' : 'bi-moon'">
      </i>

    </button>

    <div class="vr d-none d-sm-block"></div>

    <div class="d-flex align-items-center gap-2">

      <div class="text-end d-none d-sm-block">

        <div class="fw-semibold small lh-sm">
          {{ user?.firstName }} {{ user?.lastName }}
        </div>

        <div class="text-muted small lh-sm">
          {{ user?.roleName }}
        </div>

      </div>

      <img
        [src]="user?.image"
        (error)="onImageError($event)"
        class="rounded-circle border avatar-img"
        width="40"
        height="40"
        alt="">

    </div>

  </div>

</nav>

<!-- Layout -->

<div class="layout">

  <!-- Sidebar -->

  <aside
    class="offcanvas-md offcanvas-start border-end bg-body app-sidebar"
    id="sidebarOffcanvas"
    tabindex="-1">

    <div class="offcanvas-header d-md-none">

      <h5 class="mb-0">{{'menu_title' | translate}}</h5>

      <button
        class="btn-close"
        data-bs-dismiss="offcanvas"
        aria-label="Close">
      </button>

    </div>

    <div class="offcanvas-body sidebar-body">

      <!-- Brand -->

      <div class="p-3 border-bottom flex-shrink-0">

        <div class="d-flex align-items-center gap-2">

          <div class="brand-mark d-flex align-items-center justify-content-center">

            <i class="bi bi-building text-white"></i>

          </div>

          <div class="text-truncate">

            <div class="fw-bold text-primary text-truncate">
              {{'brand_name'|translate}}
            </div>

            <div class="small text-muted text-truncate">
              {{'brand_tagline'|translate}}
            </div>

          </div>

        </div>

      </div>

      <!-- Scroll Area -->

      <div class="sidebar-scroll">

        <ul class="nav nav-pills flex-column p-2 gap-1">

          <ng-container *ngFor="let item of menu$ | async">

            <ng-container
              *ngTemplateOutlet="menuItemTpl;context:{ $implicit:item }">
            </ng-container>

          </ng-container>

        </ul>

      </div>

      <!-- Logout -->

      <div class="p-3 border-top flex-shrink-0">

        <button
          class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2"
          (click)="logout()">

          <i class="bi bi-box-arrow-right"></i>

          {{'logout'|translate}}

        </button>

      </div>

    </div>

  </aside>

  <!-- Backdrop shown automatically by Bootstrap's offcanvas on mobile -->

  <!-- Main -->

  <main class="content">

    <router-outlet></router-outlet>

  </main>

</div>

<!-- Recursive Menu -->

<ng-template #menuItemTpl let-item>

  <li class="nav-item">

    <ng-container *ngIf="!item.children?.length; else child">

      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-link">

        <i class="bi" [ngClass]="getIcon(item.icon)"></i>

        <span class="flex-grow-1 text-truncate">{{item.title|translate}}</span>

      </a>

    </ng-container>

    <ng-template #child>

      <a
        class="nav-link"
        data-bs-toggle="collapse"
        [attr.href]="'#submenu-'+item.id"
        [attr.aria-expanded]="false">

        <i class="bi" [ngClass]="getIcon(item.icon)"></i>

        <span class="flex-grow-1 text-truncate">
          {{item.title|translate}}
        </span>

        <i class="bi bi-chevron-down chevron"></i>

      </a>

      <div
        class="collapse submenu"
        [id]="'submenu-'+item.id">

        <ul class="nav flex-column">

          <ng-container *ngFor="let c of item.children">

            <ng-container
              *ngTemplateOutlet="menuItemTpl;context:{ $implicit:c }">
            </ng-container>

          </ng-container>

        </ul>

      </div>

    </ng-template>

  </li>

</ng-template>
